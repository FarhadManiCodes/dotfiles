monitor.alsa.rules = [
  {
    matches = [ { node.name = "~alsa_output.pci-0000_64_00.1.*" } ]
    actions = { update-props = { audio.channels = 8 } }
  }
  {
    matches = [
      { node.name = "~alsa_output.pci-0000_64_00.6.*" }
      { node.name = "~alsa_input.pci-0000_64_00.6.*" }
      { node.name = "~alsa_input.pci-0000_64_00.5.*" }
    ]
    actions = { update-props = { audio.channels = 2 } }
  }
  {
    matches = [ { node.name = "~alsa_output.usb-Lenovo_Lenovo_Go_Wired_ANC_Headset.*" } ]
    actions = { update-props = { audio.channels = 2 } }
  }
  {
    matches = [ { node.name = "~alsa_input.usb-Lenovo_Lenovo_Go_Wired_ANC_Headset.*" } ]
    actions = { update-props = { audio.channels = 1 } }
  }
]
