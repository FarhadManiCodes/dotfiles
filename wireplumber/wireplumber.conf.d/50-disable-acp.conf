# api.alsa.acp.device factory is not available in libspa-alsa on this system,
# causing a harmless boot-time error. Disable ACP to use api.alsa.pcm.card instead.

monitor.alsa.rules = [
  {
    matches = [ { device.name = "~.*" } ]
    actions = {
      update-props = {
        api.alsa.use-acp = false
      }
    }
  }
]
