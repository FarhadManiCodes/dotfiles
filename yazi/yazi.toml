[manager]
show_hidden = false
show_symlinks = true
sort_dir_first = true

[preview]
max_width     = 500
max_height    = 500
image_quality = 50
image_filter  = "triangle"

[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"

[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'
