[mgr]
prepend_keymap = [
  { on = ["g", "d"], run = "cd /home/farhad/Downloads",      desc = "Go to Downloads" },
  { on = ["g", "D"], run = "cd /home/farhad/Cloud/Dropbox",  desc = "Go to Dropbox" },
  { on = ["g", "G"], run = "cd /home/farhad/Cloud/gdrive",   desc = "Go to Google Drive" },
  { on = ["g", "."], run = "cd /home/farhad/dotfiles",       desc = "Go to dotfiles" },

  { on = ["<Enter>"], run = "plugin smart-enter",  desc = "Open file or enter directory" },
  { on = ["M"],      run = "plugin mount",         desc = "Mount manager" },

  { on = ["f"],      run = "plugin jump-to-char",            desc = "Jump to char" },
  { on = ["F"],      run = "filter",                        desc = "Filter files" },
]
