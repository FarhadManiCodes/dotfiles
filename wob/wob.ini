# wob — Catppuccin Mocha OSD. The global section is the TOP-LEVEL keys: wob 0.16
# has no [default] header (it's parsed as an unknown section and the block is
# ignored, silently falling back to built-in defaults). [style.*] override below.
timeout = 1000
width = 400
height = 24
border_offset = 0
border_size = 2
bar_padding = 4
anchor = top
margin = 50
background_color = 1e1e2eff
border_color = 585b70ff
bar_color = 89b4faff
overflow_bar_color = f38ba8ff
overflow_background_color = 1e1e2eff
overflow_border_color = f38ba8ff

[style.brightness]
background_color = 1e1e2eff
border_color = 585b70ff
bar_color = f9e2afff

[style.muted]
background_color = f38ba8ff
border_color = f38ba8ff
bar_color = f38ba8ff

[style.mic]
background_color = 1e1e2eff
border_color = 585b70ff
bar_color = a6e3a1ff
