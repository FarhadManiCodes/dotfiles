# fnott notification daemon — Catppuccin Mocha theme
# Matches niri (border #89b4fa, inactive #585b70)

# --- Layout ---
anchor=top-right
edge-margin-vertical=10
edge-margin-horizontal=10
notification-margin=8
max-width=380
icon-theme=Papirus-Dark
max-icon-size=32

# --- Actions (fuzzel dmenu) ---
selection-helper=fuzzel --dmenu0
selection-helper-uses-null-separator=yes

# --- Normal (default) ---
layer=overlay
background=2d3d6bff
border-color=89b4faff
border-size=2
border-radius=12
padding-vertical=12
padding-horizontal=16
title-font=FiraCode Nerd Font:size=11
title-color=a6adc8ff
title-format=<i>%a</i>
summary-font=FiraCode Nerd Font:size=13
summary-color=cdd6f4ff
summary-format=<b>%s\n</b>
body-font=FiraCode Nerd Font:size=12
body-color=cdd6f4ff
default-timeout=10

# --- Urgency: low ---
[low]
border-color=585b70ff
title-color=6c7086ff
summary-color=a6adc8ff
body-color=a6adc8ff
default-timeout=6

# --- Urgency: normal ---
[normal]
border-color=89b4faff
default-timeout=10

# --- Urgency: critical (red border, no auto-dismiss) ---
[critical]
border-color=f38ba8ff
border-size=2
default-timeout=0
