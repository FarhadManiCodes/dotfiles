# ==============================================================================
#  LAZYGIT CONFIGURATION
#  Role: Data Engineer / MLOps
#  System: Arch Linux + Neovim
# ==============================================================================

gui:
  # Use Nerd Fonts v3 (Standard on Arch/modern terminals)
  nerdFontsVersion: "3"
  showIcons: true
  # Visual Tweaks
  theme:
    activeBorderColor:
      - '#61afef' # OneDark Blue
      - bold
    inactiveBorderColor:
      - '#3e4451'
    optionsTextColor:
      - '#e06c75'
    selectedLineBgColor:
      - '#2c323c'
    cherryPickedCommitBgColor:
      - '#c678dd'
    cherryPickedCommitFgColor:
      - '#ffffff'
    unstagedChangesColor:
      - '#e06c75'
    defaultFgColor:
      - '#abb2bf'
  # UI Layout
  splitDiff: 'auto'
  sidePanelWidth: 0.3333
  mainPanelSplitMode: 'flexible'
  # Commit Graph
  showFileTree: true
  commitLength:
    show: true
git:
  # Paging: Use Delta (as configured in your.gitconfig)
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
      useConfig: false
  # Merging strategy
  merging:
    # This ensures Lazygit respects the [mergetool "nvimdiff"] in your.gitconfig
    # When you press 'M', it will open the 3-pane Neovim view
    tool: nvimdiff
    args: '--no-ff'
  # Workflow Prefs
  commit:
    signOff: false
    verbose: true # Show diff while typing commit message
  pull:
    mode: 'merge'
  push:
    autoSetUpstream: true # Saves you from typing --set-upstream
  # Performance
  autoFetch: true
  autoRefresh: true
  # Log view
  branchLogCmd: 'git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium {{branchName}} --'
  allBranchesLogCmds:
    - 'git log --graph --all --color=always --abbrev-commit --decorate --date=relative  --pretty=medium'
os:
  # EDIT COMMAND
  # If you run lazygit FROM INSIDE Neovim (using a terminal buffer),
  # this prevents opening a nested Neovim instance.
  editCommand: "nvim"
  editCommandTemplate: "{{editor}} +{{line}} {{filename}}"
  # On Arch, use xdg-open to open PR links/files in browser
  openCommand: 'xdg-open {{filename}}'
# ==============================================================================
#  CUSTOM COMMANDS (Data Engineering / DVC)
# ==============================================================================
customCommands:
  # 1. DVC Integration
  # Manage large data files without leaving Lazygit
  - key: 'v'
    context: 'global'
    description: 'DVC operations (Data Version Control)'
    loadingText: 'Running DVC command...'
    prompts:
      - type: 'menu'
        key: 'DvcCommand'
        title: 'DVC Commands'
        options:
          - name: 'status'
            description: 'Check DVC status'
            value: 'dvc status'
          - name: 'push'
            description: 'Push data to remote storage'
            value: 'dvc push'
          - name: 'pull'
            description: 'Pull data from remote storage'
            value: 'dvc pull'
          - name: 'repro'
            description: 'Reproduce DVC pipeline'
            value: 'dvc repro'
    command: '{{.Form.DvcCommand}}'
  # 2. Notebook Cleaning (Manual Trigger)
  # Note: Your.gitconfig "nbstripout" filter handles this automatically now,
  # but this is useful if you want to explicitly clean files on disk.
  - key: 'N'
    context: 'global'
    description: 'Clean notebook outputs (nbconvert)'
    command: 'find . -name "*.ipynb" -exec jupyter nbconvert --clear-output --inplace {} \;'
    loadingText: 'Cleaning notebooks...'
    confirm: true
  # 3. Experiment Branching
  # Creates branches like "experiment/20251025-model-test"
  - key: 'X'
    context: 'global'
    description: 'Create experiment branch'
    prompts:
      - type: 'input'
        title: 'Experiment Name (auto-prefixed with date)'
        initialValue: 'exp-'
    command: 'git checkout -b experiment/$(date +%Y%m%d)-{{.Form.ExperimentName}}'
    loadingText: 'Creating experiment branch...'
  # 4. Interactive Commit (Legacy Support)
  # WARNING: Ensure $DOTFILES/zsh/productivity/git-enhancements.sh exists on your new Arch system
  # or this will fail.
  - key: 'C'
    context: 'files'
    description: 'Interactive commit with DS/MLOps types'
    command: 'zsh -c "source $DOTFILES/zsh/productivity/git-enhancements.sh && gci"'
    loadingText: 'Opening interactive commit...'
    output: terminal
keybinding:
  universal:
    quit: 'q'
    return: '<esc>'
  files:
    # Use 'M' to open Neovim 3-pane merge tool for conflicts
    openMergeOptions: 'M'
    commitChanges: 'c'
    refreshFiles: 'r'
    stashAllChanges: 's'
