# tmux.conf - Optimized for Arch Linux + niri + foot + neovim
# Data Engineering & Scientific Computing Setup

#==============================================================================
# PREFIX AND BASIC SETTINGS
#==============================================================================

# Free the original Ctrl-b prefix keybinding
unbind C-b

# Set the prefix as C-a
set -g prefix C-a

# Ensure that we can send C-a to other apps
bind C-a send-prefix

# Reload the file with Prefix r
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "✓ Reloaded tmux conf"

#==============================================================================
# PERFORMANCE AND RESPONSIVENESS
#==============================================================================

# Set the delay between prefix and command (0 = instant response)
set -s escape-time 0

# Set the history limit (matched with foot scrollback)
set -g history-limit 50000

# Set the base index for windows to 1 (panes intentionally kept at 0)
set -g base-index 1
set -wg pane-base-index 0

# Renumber windows when one is closed
set -g renumber-windows on

# Don't allow programs to rename windows
set -g allow-rename off

# Set the outer terminal (foot) title from the active pane — set-titles-string
# already embeds #T (pane title), so an nvim pane surfaces "NVIM - file" to foot.
# Lets nvim's VimtexEventViewReverse autocmd focus the right foot window for
# LaTeX inverse search when nvim runs inside tmux.
set -g set-titles on

# Performance optimizations
set -g focus-events on
set -g window-size largest
set -sg repeat-time 600

# Display timings — long enough to read pane numbers and status messages
set -g display-panes-time 2500   # Prefix+q pane numbers visible for 2.5s (default 1s)
set -g display-time 3000         # Status messages like "✓ Output copied" visible for 3s (default 750ms)

# Disable activity monitoring (reduces visual noise)
set -wg monitor-activity off
set -g visual-activity off

# Bell passthrough to foot (foot handles urgent hint + notify-send)
set -g bell-action any        # process bells from any pane
set -g visual-bell off        # pass BEL through to foot, don't intercept it

# Safety measure - use default shell
set -g default-command "${SHELL}"

#==============================================================================
# TERMINAL AND COLOR SETTINGS (FOOT OPTIMIZED)
#==============================================================================

# Set the default terminal mode to 256color mode
set -g default-terminal "tmux-256color"

# Enable 24-bit RGB color support (terminal-features is the modern tmux 3.2+ API)
set -as terminal-features ",foot*:RGB"

# Activate sixel graphics in tmux (foot supports this)
set -as terminal-features ",foot*:sixel"

# OSC 8 hyperlink passthrough (tmux 3.4+ stores URL per-cell and re-emits to foot)
# Enables clickable links from delta, lazygit, bat, git log, rg, ls --hyperlink
set -as terminal-features ",foot*:hyperlinks"

# Extended key reporting (modifyOtherKeys) — resolves key ambiguities for neovim
# Fixes: Ctrl+I vs Tab, Ctrl+M vs Enter, Ctrl+[ vs Escape, Shift+Enter, etc.
set -g extended-keys on
set -as terminal-features ",foot*:extkeys"

# Cursor color passthrough (foot terminfo has Cs, this ensures ST terminator compatibility)
set -as terminal-overrides ",foot*:Cs=\\E]12;%p1%s\\E\\\\"

# Enable undercurl support for neovim LSP diagnostics
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Cursor shape passthrough for neovim (beam in insert, block in normal)
# Ss: set cursor style, Se: reset to block on exit
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

#==============================================================================
# MOUSE AND INPUT
#==============================================================================

# Mouse support
set -g mouse on

# Enable vi keys in copy mode
set -wg mode-keys vi

# emacs-style line editing in the command prompt (prefix :, rename, etc).
# Set explicitly: EDITOR=vim would otherwise make tmux default this to vi.
set -g status-keys emacs

#==============================================================================
# PANE AND WINDOW APPEARANCE
#==============================================================================

# Pane border style: single, double, heavy, simple, number
set -wg pane-border-lines heavy

# Add indicators for two-pane setup
set -g pane-border-indicators colour

# Add status to panes
set -g pane-border-status off

# Active pane normal, other shaded out (optional - uncomment if desired)
# set -wg window-style fg=colour240,bg=colour235
# set -wg window-active-style fg=colour255,bg=colour0

#==============================================================================
# SMART NAVIGATION - VIM-TMUX-NAVIGATOR
#==============================================================================

# Smart pane switching with awareness of Vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Restore C-l to clear screen
bind C-l send-keys 'C-l'

#==============================================================================
# QUICK NAVIGATION WITHOUT PREFIX
#==============================================================================

# Window switching (Alt+numbers)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Window reordering (Alt+Shift+arrows)
bind -n M-S-Left swap-window -t -1 \; previous-window
bind -n M-S-Right swap-window -t +1 \; next-window

#==============================================================================
# PANE MANAGEMENT
#==============================================================================

# Split panes with | and - (opens in current directory)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane resizing with prefix Ctrl+arrows
bind -r C-Left resize-pane -L 5
bind -r C-Down resize-pane -D 5
bind -r C-Up resize-pane -U 5
bind -r C-Right resize-pane -R 5

# Swap panes easily
bind > swap-pane -D
bind < swap-pane -U

#==============================================================================
# SHELL INTEGRATION - COMMAND OUTPUT CAPTURE
# Mirrors foot's pipe-command-output (Ctrl+Shift+Y / Ctrl+Alt+C) for inside tmux.
# Requires foot_cmd_start in .zshrc to write ~/.local/state/zsh/last_command on each preexec.
#==============================================================================

# Copy last command's output — mirrors foot's Ctrl+Shift+Y fallback behavior
# Uses visible pane content (same as foot's pipe-command-output without OSC 133 markers)
# head -n -1 strips the current prompt line at the bottom
bind-key Y run-shell '\
  tmux capture-pane -p | head -n -1 | wl-copy \
  && tmux display-message "✓ Output copied"'

# Copy formatted command + output — mirrors foot's Ctrl+Alt+C
bind-key M-c run-shell '\
  last_cmd=$(cat "$HOME/.local/state/zsh/last_command" 2>/dev/null || echo "unknown"); \
  cwd=$(tmux display-message -p "#{pane_current_path}"); \
  output=$(tmux capture-pane -p | head -n -1); \
  printf "When command \`%s\` in directory \`%s\` was executed the following was its result:\n\n\`\`\`\n%s\n\`\`\`" \
    "$last_cmd" "$cwd" "$output" | wl-copy \
  && tmux display-message "✓ Formatted output copied"'

#==============================================================================
# WAYLAND CLIPBOARD INTEGRATION (PRIMARY + CLIPBOARD)
#==============================================================================

# OSC 52: let tmux intercept and use Ms override to write to foot's clipboard
# Ms override is set in TERMINAL AND COLOR SETTINGS section above
set -g set-clipboard on

# Copy mode vi-style bindings
unbind -T copy-mode-vi Space
unbind -T copy-mode-vi Enter

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel

# Copy to BOTH clipboard AND primary selection (for middle-click paste)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy && wl-copy -p"

# Quick search in copy mode
bind-key / copy-mode \; send-keys ?

# Paste from clipboard
bind C-v run-shell 'wl-paste -n | tmux load-buffer -' \; paste-buffer

#==============================================================================
# POPUP WINDOWS AND MENUS
#==============================================================================

# Quick popup terminal
unbind o  # Remove native "cycle to next pane" - we have better navigation
bind o display-popup -d "#{pane_current_path}" \
                      -x C -y C -w 50% -h 50% \
                      -e "POPUP=true" -E "zsh"

# Quick menu for common actions
bind e display-menu -T "Quick Menu" -x C -y C \
    "New Window"        n "new-window -c '#{pane_current_path}'" \
    "Horizontal Split"  - "split-window -v -c '#{pane_current_path}'" \
    "Vertical Split"    | "split-window -h -c '#{pane_current_path}'" \
    "Close Pane"        x "kill-pane" \
    "" \
    "Rename Window"     r "command-prompt -I '#W' 'rename-window %%'" \
    "Move Window"       m "command-prompt -p 'Move window to:' 'move-window -t %%'"

#==============================================================================
# TPM PLUGIN MANAGEMENT
#==============================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-power'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Theme customization (tmux-power)
set -g @tmux_power_date_format '%d-%b'
set -g @tmux_power_time_format '%H:%M'
set -g @tmux_power_theme 'everforest'

# Resurrect settings for session persistence
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'jupyter-smart jupyter-log-monitor duckdb ptpython ptipython btop btop-code btop-sys lazygit'

#==============================================================================
# SESSION MANAGEMENT
#==============================================================================

# Session management menu
bind-key S display-menu -T "Session Management" -x C -y C \
    "Save Session"     s "run-shell '~/.local/bin/tmux-safe-save'" \
    "Restore Session"  r "run-shell '~/.local/bin/tmux-fix-last && ~/.config/tmux/plugins/tmux-resurrect/scripts/restore.sh'" \
    "List Sessions"    l "display-popup -d '#{pane_current_path}' -x C -y C -w 70% -h 50% 'ls -lah ~/.local/share/tmux/resurrect/ 2>/dev/null | tail -20 && echo \"\" && echo \"Press any key or Esc to close\" && read -n 1 2>/dev/null || true'" \
    "" \
    "New Session"      n "command-prompt -p 'Session name:' 'new-session -s %%'" \
    "Kill Session"     k "confirm-before -p 'Kill current session? (y/n)' kill-session"

# Quick session save/restore shortcuts
bind-key C-s run-shell '~/.local/bin/tmux-safe-save && tmux display-message "✓ Session saved!"'
bind-key C-r run-shell '~/.local/bin/tmux-fix-last && ~/.config/tmux/plugins/tmux-resurrect/scripts/restore.sh && tmux display-message "✓ Session restored!"'

# Named session management
bind-key N command-prompt -p 'Session name:' 'run-shell "~/.local/bin/tmux-safe-save && ~/.local/bin/tmux-save-named-session %%"'
bind-key R display-popup -d '#{pane_current_path}' -x C -y C -w 70% -h 60% '~/.local/bin/tmux-session-restorer'
bind-key X display-popup -d '#{pane_current_path}' -x C -y C -w 65% -h 50% '~/.local/bin/tmux-session-cleanup'


#==============================================================================
# JUPYTER NOTEBOOK TOOLS
#==============================================================================

# Jupyter tools menu
bind-key J display-menu -T "Jupyter Tools" -x C -y C \
    "Auto Jupyter"          a "run-shell '~/.local/bin/tmux-jupyter-auto'" \
    "Custom Port"           c "command-prompt -p 'Jupyter port:' 'run-shell \"~/.local/bin/jupyter-port %%\"'" \
    "List Instances"        l "display-popup -d '#{pane_current_path}' -x C -y C -w 80% -h 60% 'jupyter-smart ls && echo \"\" && echo \"Press any key or Esc to close\" && read -t 60 -n 1 2>/dev/null || true'" \
    "Stop All"              s "display-popup -d '#{pane_current_path}' -x C -y C -w 60% -h 50% '~/.local/bin/tmux-jupyter-stop-all'"

#==============================================================================
# VIRTUAL ENVIRONMENT MANAGEMENT
#==============================================================================

# Virtual environment menu
bind-key V display-menu -T "Virtual Environments" -x C -y C \
    "Project Environment"   p "send-keys 'vp' Enter" \
    "Activate Environment"  a "send-keys 'va' Enter" \
    "Create Environment"    c "command-prompt -p 'Name:,Type (ds/de/ml/basic):' 'send-keys \"vc %% %%\" Enter'" \
    "Sync Requirements"     s "send-keys 'vs' Enter" \
    "Remove Environment"    r "command-prompt -p 'Environment to remove:' 'send-keys \"vr %%\" Enter'" \
    "" \
    "List Environments"     l "send-keys 'vl' Enter" \
    "Environment Info"      i "send-keys 'cache-stats' Enter" \
    "Project Info"          o "send-keys 'project-info' Enter" \
    "Clear Cache"           x "send-keys 'clear-cache' Enter" \
    "Help"                  h "send-keys 'vh' Enter"

#==============================================================================
# GIT + DATA SCIENCE WORKFLOW
#==============================================================================

# Git workflow menu
bind-key G display-menu -T "Git + Data Science" -x C -y C \
    "LazyGit"               g "new-window -n 'lazygit' -c '#{pane_current_path}' 'lazygit'" \
    "Data Science Status"   s "send-keys 'gstds' Enter" \
    "Interactive Commit"    c "send-keys 'gci' Enter" \
    "Git Log"               l "send-keys 'git lgd' Enter" \
    "Git Diff (Delta)"      f "split-window -v -c '#{pane_current_path}' 'git diff | delta && read'" \
    "" \
    "Start Experiment"      e "command-prompt -p 'Experiment name:' 'send-keys \"git exp-start %%\" Enter'" \
    "List Experiments"      x "send-keys 'git exp-list' Enter" \
    "Repository Info"       i "split-window -v -c '#{pane_current_path}' 'git info && read'" \
    "" \
    "DVC Status"            v "send-keys 'git dvc-status' Enter" \
    "DVC Push All"          p "split-window -v -c '#{pane_current_path}' 'git dvc-push-all'" \
    "DVC Pull All"          u "split-window -v -c '#{pane_current_path}' 'git dvc-pull-all'" \
    "" \
    "Clean Notebooks"       n "send-keys 'git clean-notebooks' Enter" \
    "Quick Commit"          q "command-prompt -p 'Message:' 'send-keys \"git commit -m \\\"%\\\"\" Enter'" \
    "Push to Origin"        P "send-keys 'git push' Enter" \
    "Pull from Origin"      U "send-keys 'git pull' Enter"

#==============================================================================
# WORKSPACE LAYOUTS
#==============================================================================

# Environment-aware workspace layouts
bind-key W display-menu -T "Workspace Layouts" -x C -y C \
    "ETL Development"       1 "send-keys 'vp' Enter \; run-shell 'sleep 3' \; run-shell '~/.config/tmux/layouts/etl_layout.sh'" \
    "Data Analysis"         2 "send-keys 'vp' Enter \; run-shell 'sleep 3' \; run-shell '~/.config/tmux/layouts/analysis_layout.sh'" \
    "" \
    "C++ Development"       3 "run-shell '~/.config/tmux/layouts/cpp_layout.sh'" \
    "Project Info"          i "send-keys 'project-info' Enter"

#==============================================================================
# C++ DEVELOPMENT SHORTCUTS
#==============================================================================

# Configure cmake with build type (C++ projects only)
bind-key C if-shell 'cd "#{pane_current_path}" && tmux-cpp-tools is-cpp-project' {
    display-menu -T "CMake Configure" -x C -y C \
        "Debug          (-g, no opt)"        d "display-popup -d '#{pane_current_path}' -x C -y C -w 80% -h 50% -E 'tmux-cpp-tools configure Debug'" \
        "Release        (-O3)"               r "display-popup -d '#{pane_current_path}' -x C -y C -w 80% -h 50% -E 'tmux-cpp-tools configure Release'" \
        "RelWithDebInfo (-O2 -g)"            i "display-popup -d '#{pane_current_path}' -x C -y C -w 80% -h 50% -E 'tmux-cpp-tools configure RelWithDebInfo'" \
        "ASan+UBSan    (debug + sanitizers)" a "display-popup -d '#{pane_current_path}' -x C -y C -w 80% -h 50% -E 'tmux-cpp-tools configure asan'" \
        "" \
        "Clean objects  (keep cmake config)"  c "display-popup -d '#{pane_current_path}' -x C -y C -w 60% -h 30% -E 'tmux-cpp-tools clean'" \
        "Clean all      (rm -rf build)"       x "display-popup -d '#{pane_current_path}' -x C -y C -w 60% -h 30% -E 'tmux-cpp-tools clean-all'" \
        "" \
        "New Project    (scaffold + git init)" n "command-prompt -p 'Project name:' 'display-popup -d \"#{pane_current_path}\" -x C -y C -w 70% -h 60% -E \"tmux-cpp-tools new %%\"'" \
        "ccache Stats   (hit rate)"            s "display-popup -d '#{pane_current_path}' -x C -y C -w 60% -h 50% -E 'tmux-cpp-tools ccache-stats'"
} { display-message "⚠ Not a C++ project (no CMakeLists.txt)" }

# Prefix b — quick build (C++ projects only)
bind-key b if-shell \
    'cd "#{pane_current_path}" && tmux-cpp-tools is-cpp-project' \
    "run-shell 'cd #{pane_current_path} && tmux-cpp-tools compile'" \
    "display-message '⚠ Not a C++ project (no CMakeLists.txt)'"

# Prefix B — C++ tools menu (C++ projects only)
bind-key B if-shell 'cd "#{pane_current_path}" && tmux-cpp-tools is-cpp-project' {
    display-menu -T "C++ Tools" -x C -y C \
        "Build"              "b" "run-shell 'cd #{pane_current_path} && tmux-cpp-tools compile'" \
        "Test"               "t" "run-shell 'cd #{pane_current_path} && tmux-cpp-tools test'" \
        "Build + Test"       "a" "run-shell 'cd #{pane_current_path} && tmux-cpp-tools build-and-test'" \
        "" \
        "Run"                "r" "display-popup -d '#{pane_current_path}' -x C -y C -w 80% -h 50% -E 'tmux-cpp-tools run'" \
        "GDB"                "g" "run-shell 'tmux new-window -n debug -c #{pane_current_path} \"tmux-cpp-tools debug\"'" \
        "Valgrind"           "v" "display-popup -d '#{pane_current_path}' -x C -y C -w 80% -h 70% -E 'tmux-cpp-tools valgrind'" \
        "clang-tidy"         "l" "display-popup -d '#{pane_current_path}' -x C -y C -w 80% -h 70% -E 'tmux-cpp-tools tidy'"
} { display-message "⚠ Not a C++ project (no CMakeLists.txt)" }

# Prefix F — Profile & Benchmark menu (C++ projects only)
bind-key F if-shell 'cd "#{pane_current_path}" && tmux-cpp-tools is-cpp-project' {
    display-menu -T "Profile & Benchmark" -x C -y C \
        "Benchmarks (gbench)"    "b" "display-popup -d '#{pane_current_path}' -x C -y C -w 60% -h 20% -E 'tmux-cpp-tools bench'" \
        "hyperfine Compare"      "h" "display-popup -d '#{pane_current_path}' -x C -y C -w 60% -h 40% -E 'tmux-cpp-tools _hyperfine-compare-session'" \
        "" \
        "perf stat"              "s" "display-popup -d '#{pane_current_path}' -x C -y C -w 60% -h 40% -E 'tmux-cpp-tools _perf-stat-select'" \
        "perf record/report"     "r" "display-popup -d '#{pane_current_path}' -x C -y C -w 60% -h 40% -E 'tmux-cpp-tools _perf-record-select'" \
        "samply (Firefox)"       "f" "display-popup -d '#{pane_current_path}' -x C -y C -w 60% -h 40% -E 'tmux-cpp-tools _samply-select'" \
        ""
} { display-message "⚠ Not a C++ project (no CMakeLists.txt)" }

#==============================================================================
# INITIALIZE TPM (KEEP AT VERY BOTTOM)
#==============================================================================

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'
