# Maximum cache size (5GB)
max_size = 5G

# Unlimited files (size-limited only)
max_files = 0

# Normalise absolute source paths to relative — critical for hit rate when
# project paths differ (different clones, different users, CI vs local).
base_dir = /home/farhad

# Use compiler binary content hash instead of mtime — more reliable on Arch
# where pacman can update mtime without changing the compiler.
compiler_check = content

# Depend mode: use -MD dependency tracking instead of running the preprocessor.
# Faster and more accurate; requires GCC/Clang (both fine here).
depend_mode = true

# Compression: level 1 is sufficient on NVMe — same space savings, much less CPU.
compression = true
compression_level = 1

# Sloppiness: safe relaxations for C++ builds
# pch_defines    — ignore #define changes in PCH lookup (standard)
# time_macros    — ignore __TIME__/__DATE__ (don't bust cache on rebuild)
# include_file_mtime — only hash header content, not mtime (helps with generated headers)
# locale         — ignore locale env vars
sloppiness = pch_defines,time_macros,include_file_mtime,locale
