# Starship prompt configuration for data engineering/ML work

format = """
[в”‚ ](bold green)\
$directory \
${custom.git_host} \
$git_branch\
$git_status\
$python\
${custom.virtualenv}\
$golang\
$cmake\
${custom.cmake_build_type}\
$docker_context\
$jobs\
$status\
$cmd_duration\
$line_break\
$character\
"""

[cmd_duration]
min_time = 500
format = "took [$duration]($style)"
style = "bold yellow"

[jobs]
symbol = "вњ¦ "
number_threshold = 1
format = "[$symbol$number]($style) "
style = "bold blue"

[status]
disabled = false
format = "[$status]($style) "
style = "bold red"

[custom.git_host]
command = """
URL=$(git remote get-url origin 2>/dev/null)
if [[ $URL =~ "github.com" ]]; then
    printf "пђ€"
elif [[ $URL =~ "gitlab.com" ]]; then
    printf "пЉ–"
elif [[ $URL =~ "bitbucket.org" ]]; then
    printf "п…±"
else
    printf "п‡“"
fi
"""
directories = [".git"]
when = 'case "$PWD" in /home/farhad/Cloud/*) exit 1;; esac; git rev-parse --is-inside-work-tree 2>/dev/null'
format = "[$output]($style)"
style = "bold purple"


[custom.virtualenv]
command = "basename \"$VIRTUAL_ENV\""
when = "test -n \"$VIRTUAL_ENV\""
symbol = ""
format = "([$output]($style)) "
style = "yellow bold"

[character]
success_symbol = "[вќЇ](bold green)"
error_symbol = "[вќЇ](bold red)"
vimcmd_symbol = "[вќ®](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style)"
style = "bold cyan"
read_only = " рџ”’"

[git_branch]
symbol = ""
format = "[$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
conflicted = "[оњЁ${count}](bold red)"
ahead = "в‡Ў${count}"
behind = "в‡Ј${count}"
diverged = "в‡•в‡Ў${ahead_count}в‡Ј${behind_count}"
untracked = "п„Ё${count}"
stashed = "пЂњ${count}"
modified = "п„Є${count}"
staged = '[пЃ§$count](green)'
renamed = "у°‘•${count}"
deleted = "Г—${count}"

[python]
symbol = "оњј "
version_format = "${minor}"
format = "[$symbol$version]($style) "
style = "yellow bold"

[golang]
symbol = "рџђ№ "
format = "[$symbol$version]($style) "
style = "bold cyan"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]

[c]
disabled = true

[cmake]
symbol = "в–і "
format = "[$symbol]($style)"
style = "bold blue"
detect_files = ["CMakeLists.txt", "CMakeCache.txt"]

[custom.cmake_build_type]
command = """
for d in build cmake-build cmake-build-debug cmake-build-release _build; do
  f="$d/CMakeCache.txt"
  [ -f "$f" ] && grep 'CMAKE_BUILD_TYPE:STRING=' "$f" | cut -d= -f2 && break
done
"""
when = """
case "$PWD" in /home/farhad/Cloud/*) exit 1;; esac
for d in build cmake-build cmake-build-debug cmake-build-release _build; do
  [ -f "$d/CMakeCache.txt" ] && exit 0
done
exit 1
"""
format = "[$output]($style) "
style = "bold purple"

[docker_context]
symbol = "рџђі "
format = "[$symbol$context]($style) "
style = "blue bold"
only_with_files = true