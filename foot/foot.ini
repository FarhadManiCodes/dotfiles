# foot terminal — Arch Linux / Niri / Wayland
# Ryzen 7840U · 60GB RAM · Radeon 780M · dual monitor (141 DPI laptop + 92 DPI external)

[main]
font=FiraCode Nerd Font:size=8
font-italic=JetBrains Mono:style=Italic:size=8
term=foot
app-id=foot
pad=8x8 center
resize-by-cells=yes
resize-keep-grid=yes
locked-title=no
initial-window-size-chars=120x35
dpi-aware=yes                    # scales correctly when moving between monitors
box-drawings-uses-font-glyphs=yes
workers=4                        # half of physical cores (recommended)

[scrollback]
lines=25000                      # matched with tmux history-limit
multiplier=5
indicator-position=relative
indicator-format=percentage

[cursor]
blink=yes
blink-rate=1000
beam-thickness=2
underline-thickness=2px

[mouse]
hide-when-typing=yes
alternate-scroll-mode=no

# dark/light switched by compositor signal; [colors] fallback is deprecated in current foot
[colors-dark]
background=1c1c1c
foreground=eeeeee
cursor=1c1c1c af87d7

regular0=1c1c1c  # black
regular1=af005f  # red
regular2=5faf00  # green
regular3=d7af5f  # yellow
regular4=5fafd7  # blue
regular5=808080  # magenta
regular6=d7875f  # cyan
regular7=d0d0d0  # white

bright0=bcbcbc   # bright black
bright1=5faf5f   # bright red
bright2=afd700   # bright green
bright3=af87d7   # bright yellow
bright4=ffaf00   # bright blue
bright5=ff5faf   # bright magenta
bright6=00afaf   # bright cyan
bright7=5f8787   # bright white

selection-foreground=1c1c1c
selection-background=af87d7
urls=5fafd7
search-box-match=1c1c1c afd700
search-box-no-match=1c1c1c af005f

# "Paper" light theme — soft background, dark ink
[colors-light]
background=f5f5f5
foreground=444444
cursor=444444 eeeeee

regular0=444444  # black
regular1=d7005f  # red
regular2=5f8700  # green
regular3=af8700  # yellow
regular4=005faf  # blue
regular5=8700af  # magenta
regular6=008787  # cyan
regular7=eeeeee  # white

bright0=767676   # bright black
bright1=d75f5f   # bright red
bright2=87af5f   # bright green
bright3=d7af5f   # bright yellow
bright4=5f87d7   # bright blue
bright5=af5fd7   # bright magenta
bright6=5fafaf   # bright cyan
bright7=ffffff   # bright white

selection-foreground=f5f5f5
selection-background=005faf
urls=005faf
search-box-match=f5f5f5 5f8700
search-box-no-match=f5f5f5 d7005f

[csd]
preferred=server
hide-when-maximized=yes
border-width=1
border-color=80404040

[key-bindings]
font-increase=Control+equal
font-decrease=Control+minus
font-reset=Control+0
search-start=Control+Shift+f
show-urls-launch=Control+Shift+o   # supports OSC 8 hyperlinks
show-urls-copy=Control+Alt+y
show-urls-persistent=Control+Shift+p
fullscreen=F11
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

# OSC 133 integration: pipe last command output to clipboard
pipe-command-output=[wl-copy] Control+Shift+y

# Copy formatted "command + output" block (for documentation/debugging)
pipe-command-output=[sh -c 'output=$(cat); last_cmd=$(cat ~/.zsh_last_command 2>/dev/null || echo "unknown command"); current_dir=$(pwd); printf "When command \`%s\` in directory \`%s\` was executed the following was its result:\n\n\`\`\`\n%s\n\`\`\`" "$last_cmd" "$current_dir" "$output" | wl-copy'] Control+Alt+c

# Copy git hashes
regex-copy=[git-hashes] Control+Shift+g

[tweak]
sixel=yes                        # matplotlib/gnuplot terminal plots
grapheme-shaping=yes
overflowing-glyphs=yes
damage-whole-window=no
delayed-render-lower=500000
delayed-render-upper=16666666    # 60Hz (16.67ms)
max-shm-pool-size-mb=1024
surface-bit-depth=auto

[url]
launch=xdg-open ${url}
osc8-underline=always

# notify=yes uses foot's built-in desktop-notifications command (includes urgency, app-id, icon)
[bell]
urgent=yes
notify=yes
visual=yes
command-focused=no

[regex:git-hashes]
regex=([a-fA-F0-9]{7,40})

[mouse-bindings]
primary-paste=BTN_MIDDLE
font-increase=Control+BTN_WHEEL_BACK
font-decrease=Control+BTN_WHEEL_FORWARD
