#
# ~/.config/paru/paru.conf
#
# NOTE: paru reads only ONE config (first of $PARU_CONF, this file, /etc/paru.conf)
# and does NOT merge — so this file fully replaces the stock /etc/paru.conf.
# Inline comments are NOT supported: a '#' must start its own line, or the rest
# of the line is parsed as part of the value. See paru.conf(5).
#

[options]
PgpFetch
Provides
DevelSuffixes = -git -cvs -svn -bzr -darcs -always -hg -fossil

# Track -git/-svn upstream HEAD on every upgrade (extra git fetches, always current).
Devel

# Migrated from old yay config.json:
#   SudoLoop        = yay sudoLoop        (keep sudo alive during long builds)
#   CombinedUpgrade = yay combinedUpgrade (upgrade repo + AUR together)
#   CleanAfter      = yay cleanAfter      (remove build dir after building)
#   RemoveMake=ask  = yay removeMake      (ask before removing make deps)
# No UpgradeMenu -> upgrades everything without a menu (yay answerUpgrade "All").
# Top-down search ordering (paru default); no BottomUp.
SudoLoop
CombinedUpgrade
CleanAfter
RemoveMake = ask
